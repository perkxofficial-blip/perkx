version: '3.8'

services:
  api:
    build:
      context: ./.docker/api
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./api:/app
    environment:
      - NODE_ENV=development
      - DATABASE_HOST=database
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=postgres
      - DATABASE_NAME=perkx
      - PORT=80
    depends_on:
      - database

  app:
    build:
      context: ./.docker/app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./app:/app
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://api:80
    depends_on:
      - api

  database:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=perkx

volumes:
  postgres_data:
